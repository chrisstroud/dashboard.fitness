name: Generate Daily Schedule

on:
  schedule:
    - cron: '30 9 * * *'  # 4:30 AM CDT (UTC-5)
  push:
    paths:
      - 'docs/**'
      - 'Volume Daddy/**'
      - 'scripts/schedule.py'
      - 'days/**'
  workflow_dispatch:  # manual trigger

concurrency:
  group: schedule
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Skip if this push was made by the action itself
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'generate') && !startsWith(github.event.head_commit.message, 'check:')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - run: python scripts/schedule.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'generate: daily schedule + weekly spine'
          file_pattern: 'days/*.md weeks/*.yaml data/schedule.yaml'
