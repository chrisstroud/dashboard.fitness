- name: Morning
  source: docs/Daily Routine.md:3
  frequency: 1x/day
  time: 05:00
  type: checklist
  items:
  - Bathroom — pee, splash water on face and hair
  - Brush teeth before coffee (protects enamel from acid) + tongue scrape
  - Health — exercise + morning light exposure
  - '**6–6:30AM** — coffee (delay 60-90 min after waking to preserve natural cortisol
    curve)'
  - Prep
  - Shower
  - Vitamin C serum → mineral sunscreen (SPF 30-50 if UV index 3+) → moisturize
  - 'Dress: pants, white shoes, shirt'
  - Breakfast
  - 'Shake: water + 50g whey + 10g creatine + 2 tbsp chia seeds'
  - 1 cup oats + cinnamon + raw honey
- name: Evening
  source: docs/Daily Routine.md:17
  frequency: 1x/day
  time: '18:00'
  type: checklist
  items:
  - '**6PM** (3 hrs before bed) — dinner'
  - '**7PM** (2 hrs before bed) — stop eating'
  - '**8PM** (1 hr before bed)'
  - No more liquids
  - Hot tub *(future)*
  - No blue light in bedroom — Kindle only
  - '**8–9PM**'
  - 'Supplements: L-Theanine + Magnesium Glycinate + Glycine + Ashwagandha KSM-66'
  - Foam face wash + cyclic sighing (5 min — double inhale nose, long slow exhale
    mouth)
  - Deep floss + 2-minute brush
  - Retinol + moisturize
  - Lock front door, open window
  - '**Bed**'
  - Take shirt off
  - Read book or Kindle
  - Charge phone in other room
