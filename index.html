<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<title>dashboard.fitness</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #6b7280;
    --accent: #2563eb;
    --border: #e5e7eb;
    --check-bg: #f0fdf4;
    --section-bg: #f9fafb;
    --card-bg: #ffffff;
    --radius: 12px;
    --tab-bg: #f9fafb;
    --tab-border: #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --fg: #e5e5e5;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --border: #27272a;
      --check-bg: #052e16;
      --section-bg: #111111;
      --card-bg: #18181b;
      --tab-bg: #111111;
      --tab-border: #27272a;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 72px; /* tab bar */
  }

  /* --- Sync bar --- */
  .sync-bar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 4px 12px; font-size: 0.75rem; text-align: center;
    z-index: 100; transform: translateY(-100%); transition: transform 0.3s;
  }
  .sync-bar.visible { transform: translateY(0); }
  .sync-bar.saving { background: #f59e0b; color: #000; }
  .sync-bar.saved { background: #22c55e; color: #000; }
  .sync-bar.error { background: #ef4444; color: #fff; }

  /* --- Header --- */
  .header {
    padding: env(safe-area-inset-top, 12px) 16px 8px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; background: var(--bg); z-index: 50;
    border-bottom: 1px solid var(--border);
  }
  .header .back {
    font-size: 1.5rem; color: var(--accent); text-decoration: none;
    line-height: 1; padding: 4px; cursor: pointer; display: none;
  }
  .header .back.visible { display: block; }
  .header .title {
    font-size: 1.1rem; font-weight: 600; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* --- Content area --- */
  #content {
    padding: 16px 16px 24px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* --- Today view (interactive checkboxes) --- */
  .today h1 {
    font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .today .meta {
    color: var(--muted); font-size: 0.85rem; margin-bottom: 8px;
  }
  .today .week-targets {
    font-size: 0.85rem; color: var(--muted);
    padding: 8px 12px; background: var(--section-bg);
    border-radius: var(--radius); margin-bottom: 20px;
  }
  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px;
  }
  .item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 12px; border-radius: var(--radius);
    transition: background 0.15s; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .item:active { background: var(--section-bg); }
  .item.checked { opacity: 0.5; }
  .item.checked .item-text { text-decoration: line-through; }
  .item.checked .checkbox { background: var(--check-bg); border-color: #22c55e; }
  .item.checked .checkbox::after { content: '\2713'; color: #22c55e; font-size: 14px; }
  .item.locked { opacity: 0.35; cursor: default; }
  .checkbox {
    width: 22px; height: 22px; min-width: 22px;
    border: 2px solid var(--border); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.15s;
  }
  .item-text { flex: 1; font-size: 0.95rem; }
  .item-text .label { font-weight: 500; }
  .item-text .detail { color: var(--muted); font-size: 0.8rem; }

  /* --- File list view --- */
  .file-list { list-style: none; }
  .file-list li {
    border-bottom: 1px solid var(--border);
  }
  .file-list a {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 4px; color: var(--fg); text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .file-list a:active { background: var(--section-bg); }
  .file-list .icon { font-size: 1.2rem; width: 28px; text-align: center; }
  .file-list .name { flex: 1; font-size: 0.95rem; }
  .file-list .arrow { color: var(--muted); font-size: 0.9rem; }

  /* --- Markdown rendered view --- */
  .md-view { font-size: 0.95rem; line-height: 1.65; }
  .md-view h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 12px; }
  .md-view h2 { font-size: 1.2rem; font-weight: 600; margin: 20px 0 8px; color: var(--fg); }
  .md-view h3 { font-size: 1.05rem; font-weight: 600; margin: 16px 0 6px; }
  .md-view h4 { font-size: 0.9rem; font-weight: 600; margin: 12px 0 4px; }
  .md-view p { margin: 8px 0; }
  .md-view ul, .md-view ol { padding-left: 20px; margin: 8px 0; }
  .md-view li { margin: 4px 0; }
  .md-view li input[type="checkbox"] {
    margin-right: 6px; transform: scale(1.15); vertical-align: middle;
  }
  .md-view blockquote {
    border-left: 3px solid var(--accent); padding: 4px 12px;
    margin: 8px 0; color: var(--muted); background: var(--section-bg);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .md-view table {
    width: 100%; border-collapse: collapse; margin: 12px 0;
    font-size: 0.85rem; overflow-x: auto; display: block;
  }
  .md-view th, .md-view td {
    border: 1px solid var(--border); padding: 6px 10px; text-align: left;
  }
  .md-view th { background: var(--section-bg); font-weight: 600; }
  .md-view code {
    background: var(--section-bg); padding: 2px 6px; border-radius: 4px;
    font-size: 0.85em;
  }
  .md-view pre { background: var(--section-bg); padding: 12px; border-radius: var(--radius); overflow-x: auto; margin: 12px 0; }
  .md-view pre code { background: none; padding: 0; }
  .md-view hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .md-view a { color: var(--accent); text-decoration: none; }
  .md-view strong { font-weight: 600; }
  .md-view em { font-style: italic; color: var(--muted); }
  .md-view img { max-width: 100%; border-radius: var(--radius); }

  /* --- Weekly progress --- */
  .week-progress {
    display: flex; gap: 16px; justify-content: center;
    padding: 10px 12px; margin-top: 8px;
    background: var(--section-bg); border-radius: var(--radius);
    font-size: 0.8rem; color: var(--muted);
  }
  .week-progress .stat { display: flex; align-items: center; gap: 6px; }
  .week-progress .dots { display: flex; gap: 3px; }
  .week-progress .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border);
  }
  .week-progress .dot.filled { background: #22c55e; }

  /* --- Tab bar --- */
  .tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; background: var(--tab-bg);
    border-top: 1px solid var(--tab-border);
    padding: 6px 0 calc(env(safe-area-inset-bottom, 0px) + 8px);
    z-index: 50;
  }
  .tabs::after {
    content: ''; position: fixed; bottom: 0; left: 0; right: 0;
    height: env(safe-area-inset-bottom, 0px);
    background: var(--tab-bg); z-index: 49;
  }
  .tabs a {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 4px 0; text-decoration: none;
    color: var(--muted); font-size: 0.6rem; font-weight: 500;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s;
  }
  .tabs a.active { color: var(--accent); }
  .tabs a svg { width: 22px; height: 22px; }

  /* --- Setup / empty states --- */
  .setup { padding: 40px 16px; text-align: center; }
  .setup h2 { font-size: 1.3rem; margin-bottom: 12px; }
  .setup p { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
  .setup input {
    width: 100%; padding: 12px; border: 2px solid var(--border);
    border-radius: var(--radius); background: var(--section-bg);
    color: var(--fg); font-size: 1rem; margin-bottom: 12px;
  }
  .setup button {
    padding: 10px 24px; background: var(--accent); color: white;
    border: none; border-radius: var(--radius);
    font-size: 0.95rem; font-weight: 500; cursor: pointer;
  }
  .setup .hint { font-size: 0.8rem; color: var(--muted); margin-top: 16px; }
  .setup .hint a { color: var(--accent); }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>
<div id="sync-bar" class="sync-bar"></div>

<div class="header">
  <span id="back-btn" class="back" onclick="goBack()">&#8249;</span>
  <span id="header-title" class="title">Today</span>
</div>

<div id="content"></div>

<nav class="tabs">
  <a href="#today" onclick="go('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Today
  </a>
  <a href="#week" onclick="go('week')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Week
  </a>
  <a href="#docs" onclick="go('docs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Docs
  </a>
  <a href="#history" onclick="go('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    History
  </a>
</nav>

<script>
// --- Config ---
const REPO = 'chrisstroud/dashboard.fitness';
const TOKEN_KEY = 'df_gh_token';
const APP_VERSION = '3';

// --- Auto-update: check if a newer version is deployed ---
(async function checkForUpdate() {
  try {
    const res = await fetch('version.txt?_=' + Date.now());
    if (!res.ok) return;
    const remote = (await res.text()).trim();
    if (remote !== APP_VERSION) {
      window.location.reload();
    }
  } catch (e) { /* offline or first deploy, skip */ }
})();

// --- State ---
let fileSha = null;
let rawMarkdown = '';
let commitQueue = null;
let navStack = [];
let currentRoute = 'today';

// --- Helpers ---
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getToken() { return localStorage.getItem(TOKEN_KEY); }
function $(id) { return document.getElementById(id); }

function syncStatus(state, msg) {
  const bar = $('sync-bar');
  bar.className = 'sync-bar visible ' + state;
  bar.textContent = msg || {saving:'Saving...',saved:'Saved',error:'Sync failed'}[state];
  if (state === 'saved') setTimeout(() => bar.className = 'sync-bar', 1500);
}

function setHeader(title, showBack) {
  $('header-title').textContent = title;
  $('back-btn').classList.toggle('visible', !!showBack);
}

function setActiveTab(name) {
  document.querySelectorAll('.tabs a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + name);
  });
}

// --- GitHub API ---
async function ghFetch(path, opts = {}) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/${path}`, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${getToken()}`,
      'Accept': 'application/vnd.github.v3+json',
      ...(opts.headers || {}),
    },
  });
  return res;
}

async function fetchFile(path) {
  const res = await ghFetch(`contents/${path}`);
  if (!res.ok) return null;
  const data = await res.json();
  const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
  return { content, sha: data.sha, path: data.path };
}

async function fetchDir(path) {
  const res = await ghFetch(`contents/${path}`);
  if (!res.ok) return [];
  const data = await res.json();
  if (!Array.isArray(data)) return [];
  return data.sort((a, b) => {
    if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
}

async function commitFile(content) {
  syncStatus('saving');
  const path = `contents/days/${todayStr()}.md`;
  const encoded = btoa(unescape(encodeURIComponent(content)));
  try {
    const res = await ghFetch(path, {
      method: 'PUT',
      body: JSON.stringify({ message: `check: ${todayStr()}`, content: encoded, sha: fileSha }),
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      syncStatus('error', `Sync failed: ${body.message || 'HTTP ' + res.status}`);
      if (res.status === 409 || res.status === 422) {
        const file = await fetchFile(`days/${todayStr()}.md`);
        if (file) { fileSha = file.sha; rawMarkdown = file.content; renderToday(rawMarkdown); }
      }
      return;
    }
    const data = await res.json();
    fileSha = data.content.sha;
    syncStatus('saved');
  } catch (e) {
    syncStatus('error', `Sync failed: ${e.message}`);
  }
}

function scheduleCommit() {
  if (commitQueue) clearTimeout(commitQueue);
  commitQueue = setTimeout(() => commitFile(rawMarkdown), 600);
}

// --- Router ---
function go(route, pushStack) {
  if (pushStack !== false && currentRoute !== route) {
    navStack.push(currentRoute);
  }
  currentRoute = route;
  window.location.hash = route;

  const token = getToken();
  if (!token) { showSetup(); return; }

  if (route === 'today') loadToday();
  else if (route === 'week') loadWeek();
  else if (route === 'docs') loadDocs();
  else if (route === 'history') loadDir('days', 'History');
  else if (route.startsWith('file/')) loadFile(route.slice(5));
}

function goBack() {
  const prev = navStack.pop();
  if (prev) go(prev, false);
  else go('today', false);
}

// --- Today view ---
async function loadToday() {
  setHeader('Today', false);
  setActiveTab('today');
  $('content').innerHTML = '<div class="loading">Loading...</div>';

  const file = await fetchFile(`days/${todayStr()}.md`);
  if (!file) {
    $('content').innerHTML = '<div class="empty"><h2>No schedule for today</h2><p>Wait for the daily GitHub Action or run the generator.</p></div>';
    return;
  }
  fileSha = file.sha;
  rawMarkdown = file.content;
  renderToday(rawMarkdown);

  // Fetch weekly progress in background
  fetchWeekProgress();
}

function renderToday(md) {
  const { title, sections } = parseTodayMd(md);
  let html = '<div class="today">';
  html += `<h1>${esc(title)}</h1>`;

  for (const section of sections) {
    html += '<div class="section">';
    html += `<div class="section-title">${esc(section.title)}</div>`;
    for (let i = 0; i < section.items.length; i++) {
      const item = section.items[i];
      const cls = item.checked ? ' checked' : '';
      // Pre-checked from earlier in the week = locked (not tappable today)
      const locked = item.checked && item.priorDay;
      const lockCls = locked ? ' locked' : '';
      const parts = splitItem(item.text);
      html += `<div class="item${cls}${lockCls}" data-section="${esc(section.title)}" data-index="${i}">`;
      html += '<div class="checkbox"></div><div class="item-text">';
      html += `<span class="label">${esc(parts.label)}</span>`;
      if (parts.detail) html += ` <span class="detail">${esc(parts.detail)}</span>`;
      html += '</div></div>';
    }
    html += '</div>';
  }

  // Weekly progress placeholder
  html += '<div id="week-progress"></div>';
  html += '</div>';
  $('content').innerHTML = html;

  // Attach click handlers (skip locked items)
  $('content').querySelectorAll('.item:not(.locked)').forEach(el => {
    el.addEventListener('click', () => toggleItem(el));
  });
}

async function fetchWeekProgress() {
  // Get ISO week boundaries
  const d = new Date();
  const dayOfWeek = (d.getDay() + 6) % 7; // Mon=0
  const monday = new Date(d);
  monday.setDate(d.getDate() - dayOfWeek);

  let strengthDone = 0, strengthTarget = 4;
  let cardioDone = 0, cardioTarget = 5;
  const strengthNames = ['Bench Day', 'Squat Day', 'Press Day', 'Hinge Day'];
  const cardioNames = ['Zone 2', 'HIIT'];

  // Fetch each day of the week so far
  for (let i = 0; i <= dayOfWeek; i++) {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    const ds = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
    const file = await fetchFile(`days/${ds}.md`);
    if (!file) continue;
    for (const line of file.content.split('\n')) {
      if (!line.startsWith('- [x]')) continue;
      const text = line.slice(6);
      if (strengthNames.some(n => text.startsWith(n))) strengthDone++;
      if (cardioNames.some(n => text.startsWith(n))) cardioDone++;
    }
  }

  const el = document.getElementById('week-progress');
  if (!el) return;

  function dots(done, target) {
    let html = '<span class="dots">';
    for (let i = 0; i < target; i++) {
      html += `<span class="dot${i < done ? ' filled' : ''}"></span>`;
    }
    html += '</span>';
    return html;
  }

  el.innerHTML = `<div class="week-progress">
    <span class="stat">Strength ${dots(strengthDone, strengthTarget)} ${strengthDone}/${strengthTarget}</span>
    <span class="stat">Cardio ${dots(cardioDone, cardioTarget)} ${cardioDone}/${cardioTarget}</span>
  </div>`;
}

function parseTodayMd(md) {
  const lines = md.split('\n');
  const sections = [];
  let current = null, title = '';

  for (const line of lines) {
    if (line.startsWith('# ')) { title = line.slice(2); continue; }
    if (line.startsWith('## ')) { current = { title: line.slice(3), items: [] }; sections.push(current); continue; }
    if (line.startsWith('- [') && current) {
      const checked = line.charAt(3) === 'x';
      let text = line.slice(6).replace(/\s*\[↗\]\([^)]+\)/, '').trim();
      // Detect if this was done on a prior day (e.g. "— Mon")
      const priorMatch = text.match(/\s—\s(Mon|Tue|Wed|Thu|Fri|Sat|Sun)$/);
      const priorDay = priorMatch ? priorMatch[1] : null;
      current.items.push({ checked, text, priorDay });
    }
  }
  return { title, sections };
}

function splitItem(text) {
  // "Bench Day (75min) — Tue" → { label: "Bench Day", detail: "75min — Tue" }
  const dashIdx = text.indexOf(' — ');
  const parenIdx = text.indexOf(' (');
  if (parenIdx > 0) {
    const label = text.slice(0, parenIdx);
    const rest = text.slice(parenIdx + 1);
    return { label, detail: rest };
  }
  if (dashIdx > 0) {
    return { label: text.slice(0, dashIdx), detail: text.slice(dashIdx + 3) };
  }
  const colon = text.indexOf(': ');
  if (colon > 0 && colon < 20) return { label: text.slice(0, colon), detail: text.slice(colon + 2) };
  return { label: text, detail: '' };
}

function toggleItem(el) {
  const section = el.dataset.section;
  const index = parseInt(el.dataset.index);
  const isChecked = el.classList.contains('checked');
  el.classList.toggle('checked');

  const lines = rawMarkdown.split('\n');
  let found = false, count = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith('## ') && lines[i].slice(3) === section) { found = true; continue; }
    if (found && lines[i].startsWith('## ')) break;
    if (found && lines[i].startsWith('- [')) {
      if (count === index) {
        lines[i] = isChecked ? lines[i].replace('- [x]', '- [ ]') : lines[i].replace('- [ ]', '- [x]');
        break;
      }
      count++;
    }
  }
  rawMarkdown = lines.join('\n');
  scheduleCommit();
}

// --- File list view ---
// --- Week view ---
async function loadWeek() {
  setHeader('This Week', false);
  setActiveTab('week');
  $('content').innerHTML = '<div class="loading">Loading...</div>';

  const d = new Date();
  const dayOfWeek = (d.getDay() + 6) % 7; // Mon=0
  const monday = new Date(d);
  monday.setDate(d.getDate() - dayOfWeek);

  const strengthNames = ['Bench Day', 'Squat Day', 'Press Day', 'Hinge Day'];
  const cardioNames = ['Zone 2', 'HIIT'];
  const strengthDone = new Set();
  const cardioCounts = { 'Zone 2': 0, 'HIIT': 0 };

  // Scan all days in the week
  for (let i = 0; i <= 6; i++) {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    const ds = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
    const file = await fetchFile(`days/${ds}.md`);
    if (!file) continue;
    for (const line of file.content.split('\n')) {
      if (!line.startsWith('- [x]')) continue;
      const text = line.slice(6);
      for (const n of strengthNames) { if (text.startsWith(n)) strengthDone.add(n); }
      for (const n of cardioNames) { if (text.startsWith(n)) cardioCounts[n]++; }
    }
  }

  const isoWeek = getISOWeek(d);
  let html = `<div class="today">`;
  html += `<h1>Week ${isoWeek}</h1>`;

  // Strength
  html += '<div class="section"><div class="section-title">Strength — ' + strengthDone.size + '/4</div>';
  for (const name of strengthNames) {
    const done = strengthDone.has(name);
    const cls = done ? ' checked' : '';
    html += `<div class="item${cls}" style="cursor:default">`;
    html += '<div class="checkbox"></div>';
    html += `<div class="item-text"><span class="label">${esc(name)}</span></div>`;
    html += '</div>';
  }
  html += '</div>';

  // Cardio
  const totalCardio = cardioCounts['Zone 2'] + cardioCounts['HIIT'];
  html += '<div class="section"><div class="section-title">Cardio — ' + totalCardio + '/5</div>';

  // Zone 2: show count out of 4
  const z2Done = cardioCounts['Zone 2'];
  html += `<div class="item${z2Done > 0 ? ' checked' : ''}" style="cursor:default">`;
  html += '<div class="checkbox"></div>';
  html += `<div class="item-text"><span class="label">Zone 2</span> <span class="detail">${z2Done}/4 sessions</span></div>`;
  html += '</div>';

  // HIIT: 1x per week
  const hiitDone = cardioCounts['HIIT'] > 0;
  html += `<div class="item${hiitDone ? ' checked' : ''}" style="cursor:default">`;
  html += '<div class="checkbox"></div>';
  html += `<div class="item-text"><span class="label">HIIT</span> <span class="detail">${hiitDone ? 'Done' : '0/1'}</span></div>`;
  html += '</div>';

  html += '</div></div>';
  $('content').innerHTML = html;
}

function getISOWeek(d) {
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  return Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7) + 1;
}

// --- Markdown file view ---
async function loadFile(path) {
  setHeader(path.split('/').pop().replace(/\.md$/, ''), true);
  setActiveTab('');
  $('content').innerHTML = '<div class="loading">Loading...</div>';

  // Could be a directory
  const res = await ghFetch(`contents/${path}`);
  if (!res.ok) {
    $('content').innerHTML = '<div class="empty"><p>Not found</p></div>';
    return;
  }
  const data = await res.json();

  // Directory listing
  if (Array.isArray(data)) {
    const sorted = data.sort((a, b) => {
      if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    let html = '<ul class="file-list">';
    for (const item of sorted) {
      const name = item.name.replace(/\.md$/, '');
      const icon = item.type === 'dir' ? '&#128193;' : '&#128196;';
      html += `<li><a href="#file/${item.path}" onclick="event.preventDefault();go('file/${item.path}')">`;
      html += `<span class="icon">${icon}</span>`;
      html += `<span class="name">${esc(name)}</span>`;
      html += '<span class="arrow">&#8250;</span>';
      html += '</a></li>';
    }
    html += '</ul>';
    $('content').innerHTML = html;
    return;
  }

  // File content
  const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
  const rendered = marked.parse(content, { gfm: true, breaks: true });
  $('content').innerHTML = `<div class="md-view">${rendered}</div>`;

  // Intercept internal links
  $('content').querySelectorAll('.md-view a').forEach(a => {
    const href = a.getAttribute('href');
    if (href && !href.startsWith('http') && !href.startsWith('#')) {
      // Resolve relative path
      const dir = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : '';
      const resolved = resolveRelativePath(dir, decodeURIComponent(href.split('#')[0]));
      if (resolved) {
        a.addEventListener('click', e => {
          e.preventDefault();
          go('file/' + resolved);
        });
      }
    }
  });
}

function resolveRelativePath(base, rel) {
  if (!rel) return null;
  const parts = base ? base.split('/') : [];
  for (const seg of rel.split('/')) {
    if (seg === '..') parts.pop();
    else if (seg !== '.' && seg !== '') parts.push(seg);
  }
  return parts.join('/');
}

  if (!token) return;
  localStorage.setItem(TOKEN_KEY, token);
  go('today', false);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
